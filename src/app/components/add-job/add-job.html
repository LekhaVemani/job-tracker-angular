<div class="card shadow-lg p-4 col-md-6 mx-auto">
  <h3 class="mb-3 text-center">➕ Add New Job</h3>

  <div class="alert alert-secondary">
    📌 Fill all fields properly before submitting.
  </div>

  <input [(ngModel)]="job.company" placeholder="🏢 Company Name" class="form-control mb-3">
  <input [(ngModel)]="job.role" placeholder="💼 Role" class="form-control mb-3">

  <!-- ✅ STATUS DROPDOWN -->
  <select [(ngModel)]="job.status" class="form-control mb-3">
    <option value="">Select Status</option>
    <option value="Applied">Applied</option>
    <option value="Interview">Interview</option>
    <option value="Selected">Selected</option>
    <option value="Rejected">Rejected</option>
  </select>

  <button (click)="addJob()" class="btn btn-success w-100">
    🚀 Add Job
  </button>
</div>
